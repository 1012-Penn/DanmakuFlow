# DanmakuFlow Prometheus 配置
# 抓取两个实例的 /metrics 端点

global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'danmakuflow'
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'danmaku-a:8080'
          - 'danmaku-b:8080'
        labels:
          app: 'danmakuflow'
