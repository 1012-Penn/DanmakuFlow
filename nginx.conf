worker_rlimit_nofile 65535;

events {
    # Each proxied WebSocket consumes one downstream and one upstream fd.
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # 基础优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    keepalive_requests 1000;
    client_body_buffer_size 8k;
    client_max_body_size 1k;

    # WebSocket 升级映射
    map $http_upgrade $connection_upgrade {
        default  "upgrade";
        ""       "close";
    }

    upstream danmaku_backend {
        server danmaku-a:8080 max_fails=3 fail_timeout=10s;
        server danmaku-b:8080 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 8080;
        server_name _;

        # 统一代理头
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 端点（需长超时）
        location /ws {
            proxy_pass http://danmaku_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # HTTP API
        location /api/ {
            proxy_pass http://danmaku_backend;
        }

        # 健康检查与指标
        location /healthz { proxy_pass http://danmaku_backend; }
        location /readyz  { proxy_pass http://danmaku_backend; }
        location /metrics { proxy_pass http://danmaku_backend; }

        # pprof 默认不通过 Nginx 代理，本地直接访问实例端口：
        #   curl http://localhost:8081/debug/pprof/heap
        # 如有需要可取消注释以下配置：
        # location /debug/pprof/ { proxy_pass http://danmaku_backend; }

        # 前端静态（所有实例一致，可轮询）
        location / {
            proxy_pass http://danmaku_backend;
        }
    }
}
