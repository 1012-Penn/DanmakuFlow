# DanmakuFlow 双实例部署 + 可观测性
# 一键启动: docker compose up --build -d
# 停止:     docker compose down

services:
  mysql:
    image: mysql:8.0
    container_name: danmaku-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: danmaku
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - danmaku-net

  redis:
    image: redis:7-alpine
    container_name: danmaku-redis
    ports:
      - "6380:6379"
    command: redis-server --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - danmaku-net

  danmaku-a:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: danmaku-a
    ports:
      - "8081:8080"
    environment:
      SERVER_PORT: "8080"
      STORE_DSN: "root:root@tcp(mysql:3306)/danmaku?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
      REDIS_INSTANCE_ID_PREFIX: "danmaku-a"
      LOG_LEVEL: "info"
      LOG_FORMAT: "json"
      JWT_SECRET: "danmakuflow-docker-secret-do-not-use-in-production"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - danmaku-net

  danmaku-b:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: danmaku-b
    ports:
      - "8082:8080"
    environment:
      SERVER_PORT: "8080"
      STORE_DSN: "root:root@tcp(mysql:3306)/danmaku?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis:6379"
      REDIS_INSTANCE_ID_PREFIX: "danmaku-b"
      LOG_LEVEL: "info"
      LOG_FORMAT: "json"
      JWT_SECRET: "danmakuflow-docker-secret-do-not-use-in-production"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - danmaku-net

  nginx:
    image: nginx:1.27-alpine
    container_name: danmaku-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - danmaku-a
      - danmaku-b
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - danmaku-net

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: danmaku-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - danmaku-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: danmaku-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - danmaku-net

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:

networks:
  danmaku-net:
    driver: bridge
