<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DanmakuFlow | 直播间大厅</title>
  <style>
    :root { color-scheme: dark; --bg:#0c111b; --panel:#151d2b; --line:#293548; --text:#edf2f7; --muted:#94a3b8; --accent:#34d399; --danger:#fb7185; }
    * { box-sizing:border-box; } body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font:15px/1.5 system-ui,-apple-system,"Microsoft YaHei",sans-serif; }
    a { color:inherit; } .shell { width:min(1120px,calc(100% - 32px)); margin:0 auto; }
    header { border-bottom:1px solid var(--line); background:#101722; } .topbar { min-height:68px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .brand { font-weight:700; font-size:19px; text-decoration:none; } .brand small { color:var(--accent); font-size:12px; margin-left:8px; font-weight:600; }
    .user { color:var(--muted); display:flex; align-items:center; gap:12px; } button,.button { border:1px solid var(--line); border-radius:6px; padding:8px 13px; background:#202b3c; color:var(--text); cursor:pointer; font:inherit; text-decoration:none; }
    button:hover,.button:hover { border-color:#51627a; } .primary { background:var(--accent); color:#06261d; border-color:var(--accent); font-weight:700; } .primary:hover { background:#6ee7b7; }
    main { padding:48px 0 64px; } .eyebrow { color:var(--accent); font-size:13px; font-weight:700; } h1 { margin:8px 0; font-size:34px; letter-spacing:0; } .lead { color:var(--muted); margin:0; max-width:690px; }
    .create { margin:28px 0 36px; border:1px solid var(--line); background:var(--panel); padding:20px; border-radius:8px; display:flex; gap:12px; align-items:center; justify-content:space-between; }
    .create-copy strong { display:block; } .create-copy span { color:var(--muted); font-size:13px; } .create form { display:flex; gap:8px; } input { min-width:260px; padding:9px 10px; border:1px solid var(--line); border-radius:6px; color:var(--text); background:#0f1621; font:inherit; }
    .section-head { display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:14px; } h2 { font-size:18px; margin:0; } .count { color:var(--muted); font-size:13px; }
    #rooms { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px; } .room { border:1px solid var(--line); border-radius:8px; background:var(--panel); padding:17px; min-height:155px; display:flex; flex-direction:column; }
    .room h3 { margin:10px 0 7px; font-size:17px; overflow-wrap:anywhere; } .room-id { color:var(--muted); font:12px ui-monospace,SFMono-Regular,monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; } .room .button { margin-top:auto; text-align:center; }
    .status { color:#052e20; background:var(--accent); border-radius:4px; width:max-content; padding:2px 7px; font-size:12px; font-weight:700; } .empty { padding:32px; border:1px dashed var(--line); color:var(--muted); text-align:center; }
    .hidden { display:none !important; } .notice { color:var(--danger); font-size:13px; margin-top:8px; }
    @media (max-width:680px) { .topbar,.create { align-items:flex-start; flex-direction:column; } .create form { width:100%; flex-wrap:wrap; } input { min-width:0; flex:1 1 100%; } h1 { font-size:28px; } }
  </style>
</head>
<body>
  <header><div class="shell topbar"><a class="brand" href="/">DanmakuFlow <small>LIVE INTERACTION</small></a><div id="user" class="user"></div></div></header>
  <main class="shell">
    <div class="eyebrow">直播互动系统</div><h1>正在直播</h1><p class="lead">进入任意直播间观看实时弹幕。登录后可以创建自己的直播间，身份与房间状态由服务端统一校验。</p>
    <section id="create" class="create hidden"><div class="create-copy"><strong>创建直播间</strong><span>创建后将进入准备状态，由房主开始直播。</span></div><form id="createForm"><input id="title" maxlength="100" placeholder="给直播间起个标题" required><button class="primary" type="submit">创建并进入</button></form></section>
    <div class="section-head"><h2>直播中的房间</h2><span id="count" class="count">加载中</span></div><div id="rooms"></div><div id="notice" class="notice"></div>
  </main>
  <script>
    const token = localStorage.getItem('token'); let me = null;
    const nextLogin = () => '/login?next=' + encodeURIComponent(location.pathname + location.search);
    async function api(path, options = {}) { const headers = {...(options.headers || {})}; if (token) headers.Authorization = 'Bearer ' + token; const resp = await fetch(path, {...options, headers}); const data = await resp.json().catch(() => ({})); if (!resp.ok) throw new Error(data.message || data.error || '请求失败'); return data; }
    function escapeText(value) { const node = document.createElement('span'); node.textContent = value || ''; return node.textContent; }
    function renderUser() { const el = document.getElementById('user'); if (!me) { el.innerHTML = `<span>游客可观看直播</span><a class="button" href="${nextLogin()}">登录 / 注册</a>`; return; } el.innerHTML = `<span>${escapeText(me.nickname || me.username)}</span><button id="logout">退出</button>`; document.getElementById('logout').onclick = () => { localStorage.clear(); location.reload(); }; document.getElementById('create').classList.remove('hidden'); }
    function renderRooms(rooms) { const root = document.getElementById('rooms'); document.getElementById('count').textContent = `${rooms.length} 个直播间`; if (!rooms.length) { root.innerHTML = `<div class="empty">当前没有直播中的房间。${me ? '你可以先创建一个并开始直播。' : '登录后可以创建自己的直播间。'}</div>`; return; } root.innerHTML = ''; rooms.forEach(room => { const card = document.createElement('article'); card.className='room'; card.innerHTML = `<span class="status">直播中</span><h3></h3><div class="room-id"></div><a class="button">进入直播间</a>`; card.querySelector('h3').textContent=room.title; card.querySelector('.room-id').textContent='ID: '+room.id; card.querySelector('a').href='/room?room_id='+encodeURIComponent(room.id); root.appendChild(card); }); }
    async function boot() { try { if (token) { const result = await api('/api/auth/me'); me = result.user; } } catch (_) { localStorage.clear(); } renderUser(); try { renderRooms(await api('/api/rooms?status=live&limit=20')); } catch (err) { document.getElementById('notice').textContent=err.message; document.getElementById('count').textContent='加载失败'; } }
    document.getElementById('createForm').onsubmit = async event => { event.preventDefault(); const btn=event.target.querySelector('button'); btn.disabled=true; try { const room=await api('/api/rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:document.getElementById('title').value.trim()})}); location.href='/room?room_id='+encodeURIComponent(room.id); } catch(err) { document.getElementById('notice').textContent=err.message; } finally { btn.disabled=false; } };
    boot();
  </script>
</body>
</html>
