<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Danmaku - Room</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; padding: 20px; background: #1a1a2e; color: #fff; }
        #room-header { font-size: 18px; color: #e94560; margin-bottom: 12px; }

        /* ---- 弹幕播放区 ---- */
        #box {
            position: relative;
            width: 100%; height: 400px; overflow: hidden;
            border: 1px solid #333; border-radius: 8px;
            background: #16213e; margin-bottom: 12px;
        }

        /* 所有弹幕共用的基础样式 */
        .danmaku-item {
            position: absolute;
            white-space: nowrap;
            pointer-events: none;
        }

        /* 滚动弹幕：从容器右侧外 → 左侧外 */
        .danmaku-scroll {
            animation: scrollRight 5s linear forwards;
        }
        @keyframes scrollRight {
            from { left: 100%; }
            to   { left: -100%; }
        }

        /* 逆向滚动：从容器左侧外 → 右侧外 */
        .danmaku-reverse {
            animation: scrollLeft 5s linear forwards;
        }
        @keyframes scrollLeft {
            from { left: -100%; }
            to   { left: 100%; }
        }

        /* 顶部 / 底部固定：居中出现，停留后淡出 */
        .danmaku-top,
        .danmaku-bottom {
            left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); padding: 2px 12px; border-radius: 4px;
            animation: fadeOut 4s ease-in forwards;
        }
        .danmaku-top    { top: 8px; }
        .danmaku-bottom { bottom: 8px; }
        @keyframes fadeOut {
            0%, 70% { opacity: 1; }
            100%    { opacity: 0; }
        }

        /* ---- 输入区 ---- */
        #controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        #input { padding: 10px; flex: 1; min-width: 200px; border-radius: 6px; border: none; }
        #sendBtn { padding: 10px 20px; border-radius: 6px; border: none; background: #0f3460; color: #fff; cursor: pointer; }
        #sendBtn:hover { background: #1a5276; }

        select { padding: 10px; border-radius: 6px; border: none; background: #0f3460; color: #fff; }
        select option { background: #1a1a2e; }

        .status { font-size: 14px; color: #888; margin-top: 8px; }
        .status.ok { color: #2ecc71; }
        .status.error { color: #e94560; }
        .error { color: #e94560; font-size: 18px; text-align: center; margin-top: 100px; }
    </style>
</head>
<body>
    <h1>Danmaku</h1>
    <div id="room-header">📺 房间: <span id="room-name">-</span></div>
    <div id="box"></div>

    <div id="controls">
        <input id="input" type="text" placeholder="Type here..." />
        <select id="typeSelect">
            <option value="scroll">滚动</option>
            <option value="top">顶部</option>
            <option value="bottom">底部</option>
            <option value="reverse">逆向</option>
        </select>
        <button id="sendBtn">Send</button>
    </div>
    <div id="status" class="status">Disconnected</div>

    <script>
        const params = new URLSearchParams(location.search);
        const roomID = params.get('room');

        if (!roomID) {
            document.body.innerHTML = '<div class="error">❌ 请通过 ?room=xxx 指定房间号<br><small>例如: http://localhost:8080/?room=abc</small></div>';
            throw new Error('room parameter required');
        }

        const box = document.getElementById('box');
        const input = document.getElementById('input');
        const typeSelect = document.getElementById('typeSelect');
        const statusEl = document.getElementById('status');
        document.getElementById('room-name').textContent = roomID;

        // ---- 重连状态 ----
        let ws = null;
        let reconnectAttempts = 0;
        let reconnectTimer = null;

        // ---- 历史补偿追踪 ----
        let lastMessageId = '';
        let lastTimestamp = '';

        // 弹幕去重 set（重连时用）
        const renderedIds = new Set();

        // ---- 弹幕海：密集行 + 多样变化 ----
        const ROW_HEIGHT = 22;
        const rowCount = Math.floor(box.clientHeight / ROW_HEIGHT);
        const rowPositions = Array.from({ length: rowCount }, (_, i) => i * ROW_HEIGHT + 4);

        function randRow() {
            return rowPositions[Math.floor(Math.random() * rowPositions.length)];
        }

        function randDur() {
            return (2.5 + Math.random() * 2).toFixed(1);
        }

        function randDelay() {
            return (-Math.random() * 2.8).toFixed(1);
        }

        // ---- 渲染一条弹幕 ----
        function renderDanmaku(d) {
            const type = d.type || 'scroll';

            const el = document.createElement('div');
            el.className = 'danmaku-item';

            if (type === 'scroll') {
                el.style.top = randRow() + 'px';
                el.style.animationDuration = randDur() + 's';
                el.style.animationDelay = randDelay() + 's';
                el.addEventListener('animationend', () => el.remove());
                el.classList.add('danmaku-scroll');
            } else if (type === 'reverse') {
                el.style.top = randRow() + 'px';
                el.style.animationDuration = randDur() + 's';
                el.style.animationDelay = randDelay() + 's';
                el.addEventListener('animationend', () => el.remove());
                el.classList.add('danmaku-reverse');
            } else {
                el.addEventListener('animationend', () => el.remove());
                el.classList.add('danmaku-' + type);
            }

            el.style.color = d.color || '#ffffff';
            el.style.fontSize = (d.font_size || 25) + 'px';
            el.textContent = d.content;
            box.appendChild(el);
        }

        // ---- 创建 WebSocket 连接 ----
        function connect() {
            if (ws) { ws.onclose = null; ws.close(); ws = null; }

            // 构建 WS URL，使用 location.host 避免硬编码
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            let url = protocol + '//' + location.host + '/ws?room_id=' + encodeURIComponent(roomID);

            // 断线重连时携带历史补偿参数
            if (reconnectAttempts > 0 && lastTimestamp) {
                url += '&since_time=' + encodeURIComponent(lastTimestamp);
                if (lastMessageId) {
                    url += '&last_message_id=' + encodeURIComponent(lastMessageId);
                }
            }

            ws = new WebSocket(url);

            ws.onopen = function() {
                statusEl.textContent = '✅ Connected to ' + roomID;
                statusEl.className = 'status ok';
                reconnectAttempts = 0;
                if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            };

            ws.onclose = function() {
                statusEl.textContent = '❌ Disconnected';
                statusEl.className = 'status';
                scheduleReconnect();
            };

            ws.onmessage = function(e) {
                var env;
                try { env = JSON.parse(e.data); } catch(_) { return; }

                switch (env.type) {
                    case 'broadcast':
                        if (env.payload) {
                            // 追踪最后一条消息的 ID 和时间戳
                            if (env.payload.id) lastMessageId = env.payload.id;
                            if (env.payload.timestamp) lastTimestamp = env.payload.timestamp;
                            // 广播渲染（无需去重）
                            renderDanmaku(env.payload);
                        }
                        break;

                    case 'history':
                        if (env.payload && env.payload.danmaku) {
                            // 历史补偿：按 message_id 去重
                            env.payload.danmaku.forEach(function(d) {
                                if (d.id && renderedIds.has(d.id)) return;
                                if (d.id) renderedIds.add(d.id);
                                if (d.id) lastMessageId = d.id;
                                if (d.timestamp) lastTimestamp = d.timestamp;
                                renderDanmaku(d);
                            });
                        }
                        break;

                    case 'ack':
                        // 确认消息：可选在 status 显示
                        if (env.payload && env.payload.ok) {
                            statusEl.textContent = '✓ sent (' + (env.payload.message_id || '').slice(0, 8) + ')';
                            statusEl.className = 'status ok';
                        }
                        break;

                    case 'error':
                        // 错误消息：在 status 显示原因
                        if (env.payload) {
                            statusEl.textContent = '✗ ' + (env.payload.message || env.payload.code || 'error');
                            statusEl.className = 'status error';
                        }
                        break;
                }
            };
        }

        // ---- 指数退避重连 ----
        function scheduleReconnect() {
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            reconnectAttempts++;
            // 退避：1s, 2s, 4s, 8s, ... 最大 30s
            var delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 30000);
            // 加 ±20% jitter
            delay = Math.round(delay * (0.8 + Math.random() * 0.4));

            statusEl.textContent = '⏳ Reconnecting in ' + Math.round(delay / 1000) + 's... (#' + reconnectAttempts + ')';
            statusEl.className = 'status';

            reconnectTimer = setTimeout(function() { connect(); }, delay);
        }

        // ---- 发送弹幕 ----
        function send() {
            const text = input.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

            // 使用新信封格式（旧裸格式仍被服务端兼容）
            ws.send(JSON.stringify({
                type: 'danmaku',
                payload: {
                    content: text,
                    user_id: 'user_' + Date.now(),
                    color: '#ffffff',
                    type: typeSelect.value
                }
            }));
            input.value = '';
        }

        document.getElementById('sendBtn').onclick = send;
        input.onkeydown = function(e) { if (e.key === 'Enter') send(); };

        // ---- 启动 ----
        connect();
    </script>
</body>
</html>
