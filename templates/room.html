<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>DanmakuFlow | 直播间</title>
  <style>
    :root { color-scheme:dark; --bg:#0c111b; --panel:#151d2b; --line:#293548; --text:#edf2f7; --muted:#94a3b8; --accent:#34d399; --warn:#fbbf24; --danger:#fb7185; } *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 system-ui,-apple-system,"Microsoft YaHei",sans-serif}.shell{width:min(1180px,calc(100% - 32px));margin:auto}header{border-bottom:1px solid var(--line);background:#101722}.top{min-height:64px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{color:var(--text);font-size:19px;font-weight:700;text-decoration:none}.brand span{color:var(--accent);font-size:12px;margin-left:8px}button,.button{border:1px solid var(--line);border-radius:6px;padding:8px 12px;background:#202b3c;color:var(--text);font:inherit;cursor:pointer;text-decoration:none}button:disabled{opacity:.45;cursor:not-allowed}.primary{background:var(--accent);border-color:var(--accent);color:#06261d;font-weight:700}.danger{color:#fecdd3;border-color:#9f1239;background:#4c1024}.room-head{padding:28px 0 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}.back{color:var(--muted);font-size:13px;text-decoration:none}.room-head h1{font-size:27px;margin:6px 0}.meta{color:var(--muted);font-size:13px}.chip{display:inline-block;border-radius:4px;padding:3px 8px;font-size:12px;font-weight:700}.live{color:#052e20;background:var(--accent)}.pending{color:#422006;background:var(--warn)}.ended,.banned{color:#4c0519;background:var(--danger)}#ownerControls{display:flex;gap:8px}.layout{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(290px,.8fr);gap:16px}.stage,.feed,.composer{border:1px solid var(--line);background:var(--panel);border-radius:8px}.stage{height:440px;overflow:hidden;position:relative;background:#101722;padding:18px}.stage-label{color:var(--muted);font-size:13px}.bullet{position:absolute;left:100%;white-space:nowrap;font-weight:700;text-shadow:0 1px 3px #000;animation:fly 9s linear forwards}@keyframes fly{to{transform:translateX(-140vw)}}.feed{padding:14px;max-height:440px;overflow:auto}.feed h2{font-size:15px;margin:0 0 10px}.message{padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;overflow-wrap:anywhere}.message time{display:block;color:var(--muted);font-size:11px;margin-top:3px}.composer{margin-top:16px;padding:14px;display:flex;gap:8px}.composer input{min-width:0;flex:1;border:1px solid var(--line);border-radius:6px;background:#0f1621;color:var(--text);font:inherit;padding:9px 10px}.hint,.notice{margin-top:10px;color:var(--muted);font-size:13px}.notice.error{color:var(--danger)}.hidden{display:none!important}@media(max-width:760px){.room-head{flex-direction:column}.layout{grid-template-columns:1fr}.stage{height:330px}.feed{max-height:260px}.top{align-items:flex-start;padding:12px 0}}
  </style>
</head>
<body>
<header><div class="shell top"><a class="brand" href="/">DanmakuFlow <span>LIVE</span></a><div id="user"></div></div></header>
<main class="shell"><section class="room-head"><div><a class="back" href="/">返回直播间大厅</a><h1 id="title">加载直播间...</h1><div id="meta" class="meta"></div></div><div id="ownerControls"></div></section><div class="layout"><section id="stage" class="stage"><div class="stage-label">实时弹幕区域</div></section><aside class="feed"><h2>最近弹幕</h2><div id="messages"></div></aside></div><form id="composer" class="composer"><input id="content" maxlength="500" placeholder="加载房间状态中..." disabled><button id="send" class="primary" disabled>发送</button></form><div id="hint" class="hint"></div><div id="notice" class="notice"></div></main>
<script>
const roomID=new URLSearchParams(location.search).get('room_id'); const token=localStorage.getItem('token'); let me=null,room=null,ws=null,shouldReconnect=true,retry=0; const $=id=>document.getElementById(id);
const loginURL=()=>'/login?next='+encodeURIComponent(location.pathname+location.search); const api=async(path,opt={})=>{const headers={...(opt.headers||{})};if(token)headers.Authorization='Bearer '+token;const r=await fetch(path,{...opt,headers});const d=await r.json().catch(()=>({}));if(!r.ok){const e=new Error(d.message||d.error||'请求失败');e.code=d.error;e.status=r.status;throw e}return d};
function setNotice(text,error=false){$('notice').textContent=text||'';$('notice').className='notice'+(error?' error':'')}; function userView(){const e=$('user');if(!me){e.innerHTML=`<a class="button" href="${loginURL()}">登录后发送弹幕</a>`;return}e.innerHTML=`<span class="meta">${me.nickname||me.username}</span> <button id="logout">退出</button>`;$('logout').onclick=()=>{localStorage.clear();shouldReconnect=false;if(ws)ws.close();location.reload()}}
function statusText(status){return({live:'直播中',pending:'准备中',ended:'直播已结束',banned:'房间已封禁'})[status]||status} function renderRoom(){if(!room)return;$('title').textContent=room.title;$('meta').innerHTML=`<span class="chip ${room.status}">${statusText(room.status)}</span> &nbsp; 房间 ID: ${room.id}`;const owner=me&&me.id===room.owner_id;$('ownerControls').innerHTML=owner&&room.status==='pending'?'<button id="start" class="primary">开始直播</button>':owner&&room.status==='live'?'<button id="end" class="danger">结束直播</button>':'';const action=$('start')||$('end');if(action)action.onclick=()=>changeRoom(room.status==='pending'?'start':'end');const input=$('content'),send=$('send');const canSend=room.status==='live'&&!!me;input.disabled=!canSend;send.disabled=!canSend;if(canSend){input.placeholder='输入弹幕，按 Enter 发送';$('hint').textContent='已验证身份，可发送实时弹幕。'}else if(room.status==='live'){input.placeholder='登录后即可发送弹幕';$('hint').innerHTML=`游客可观看直播，<a href="${loginURL()}">登录后发送弹幕</a>。`}else{input.placeholder='当前直播间不可发送弹幕';$('hint').textContent=`当前为${statusText(room.status)}，仅保留历史弹幕观看。`}}
async function changeRoom(action){try{await api('/api/rooms/'+encodeURIComponent(roomID)+'/'+action,{method:'POST'});await refreshRoom();if(room.status==='live')connect();else{shouldReconnect=false;if(ws)ws.close();setNotice('直播已结束，发送入口已关闭。')}}catch(err){setNotice(err.message,true)}}
async function refreshRoom(){try{room=await api('/api/rooms/'+encodeURIComponent(roomID));renderRoom();return room}catch(err){$('title').textContent='直播间不可用';$('meta').textContent=err.message;$('composer').classList.add('hidden');setNotice(err.message,true);throw err}}
function addMessage(dm,animate=false){if(!dm||!dm.id||document.querySelector('[data-id="'+CSS.escape(dm.id)+'"]'))return;const item=document.createElement('article');item.className='message';item.dataset.id=dm.id;item.textContent=dm.content;const time=document.createElement('time');time.textContent=new Date(dm.timestamp||Date.now()).toLocaleTimeString();item.appendChild(time);$('messages').prepend(item);if(animate){const bullet=document.createElement('div');bullet.className='bullet';bullet.style.top=(42+Math.floor(Math.random()*330))+'px';bullet.style.color=dm.color||'#fff';bullet.textContent=dm.content;$('stage').appendChild(bullet);bullet.addEventListener('animationend',()=>bullet.remove())}}
async function loadHistory(){try{const list=await api('/api/room/'+encodeURIComponent(roomID)+'/danmaku');list.slice().reverse().forEach(dm=>addMessage(dm,false))}catch(err){setNotice('历史弹幕加载失败：'+err.message,true)}}
function connect(){if(!room||room.status!=='live'||ws)return;const protocol=location.protocol==='https:'?'wss:':'ws:';const query='room_id='+encodeURIComponent(roomID)+(token?'&token='+encodeURIComponent(token):'');ws=new WebSocket(protocol+'//'+location.host+'/ws?'+query);ws.onopen=()=>{retry=0;setNotice(me?'已连接实时通道。':'已连接观看通道。')};ws.onmessage=event=>{const env=JSON.parse(event.data);if(env.type==='broadcast'){addMessage(env.payload,true)}else if(env.type==='error'){setNotice(env.payload.reason||env.payload.code,true);if(['room_not_live','room_banned','room_not_found'].includes(env.payload.code)){refreshRoom().catch(()=>{});shouldReconnect=false;if(ws)ws.close()}}};ws.onclose=()=>{ws=null;if(shouldReconnect&&room&&room.status==='live'){const delay=Math.min(5000,500*Math.pow(2,retry++));setTimeout(connect,delay)}};ws.onerror=()=>setNotice('实时连接暂不可用，正在重试。',true)}
$('composer').onsubmit=e=>{e.preventDefault();const content=$('content').value.trim();if(!content||!ws||ws.readyState!==WebSocket.OPEN)return;ws.send(JSON.stringify({type:'danmaku',payload:{content,request_id:crypto.randomUUID(),color:'#ffffff',type:'scroll',font_size:25}}));$('content').value=''};
async function boot(){if(!roomID){$('title').textContent='缺少 room_id';return}if(token){try{me=(await api('/api/auth/me')).user}catch(_){localStorage.clear()}}userView();try{await refreshRoom();await loadHistory();if(room.status==='live')connect()}catch(_){}} boot();
</script></body></html>
